# /etc/nginx/sites-available/spare-parts
# Symlink to sites-enabled after setup.
#
# Assumes:
#   - API running on 127.0.0.1:8000
#   - SSL certificates at /etc/letsencrypt/live/api.lvtrade.ru/
#   - Replace api.lvtrade.ru with your actual subdomain

server {
    listen 80;
    server_name api.lvtrade.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.lvtrade.ru;

    ssl_certificate     /etc/letsencrypt/live/api.lvtrade.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lvtrade.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # CORS for lvtrade.ru widget
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.)?lvtrade\.ru$") {
        set $cors_origin $http_origin;
    }

    # Chat API — SSE-friendly (no buffering)
    location /api/v1/chat {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE streaming
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # All other API endpoints
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health probe (for uptime monitoring)
    location /api/v1/health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
