version: "3.9"

# Local development stack.
# In production, replace db with a managed database (RDS, Cloud SQL, etc.)

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: spare_parts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-spare_parts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  api:
    build:
      context:    .
      dockerfile: docker/Dockerfile
    container_name: spare_parts_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-spare_parts}
    ports:
      - "8000:8000"
    volumes:
      - .:/app   # hot-reload in development; remove in production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
